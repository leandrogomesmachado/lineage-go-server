# L2Raptors GameServer Configuration

server:
  id: 1
  name: "Raptors"
  host: "0.0.0.0"
  port: 7777
  max_players: 1000
  
loginserver:
  host: "127.0.0.1"
  port: 9014
  
database:
  uri: "mongodb://localhost:27017"
  database: "l2raptors"
  timeout: 10
  
datapack:
  path: "../raptors-go_datapack"
  
geodata:
  enabled: true
  path: "../l2raptors-java/raptors_gameserver/data/geodata"
  
world:
  grid_size: 256
  regions_x: 256
  regions_y: 256
  
rates:
  xp: 1.0
  sp: 1.0
  adena: 1.0
  drop: 1.0
  spoil: 1.0
  
logging:
  level: "info"
  file: "logs/gameserver.log"
  console: true
